version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: voice_cloning_db
    environment:
      POSTGRES_DB: voice_cloning
      POSTGRES_USER: voice_user
      POSTGRES_PASSWORD: voice_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice_user -d voice_cloning"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: voice_cloning_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ..
      dockerfile: deployment/docker/backend.Dockerfile
    container_name: voice_cloning_backend
    environment:
      - DATABASE_URL=postgresql://voice_user:voice_password@postgres:5432/voice_cloning
      - REDIS_URL=redis://redis:6379
      - STORAGE_TYPE=local
      - LOCAL_STORAGE_PATH=/app/storage
      - MODEL_CACHE_DIR=/app/models
      - DEBUG=true
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
      - backend_models:/app/models
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Frontend
  frontend:
    build:
      context: ..
      dockerfile: deployment/docker/frontend.Dockerfile
    container_name: voice_cloning_frontend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ../frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ML Training Service (Optional)
  ml_training:
    build:
      context: ..
      dockerfile: deployment/docker/ml_training.Dockerfile
    container_name: voice_cloning_ml
    environment:
      - BACKEND_URL=http://backend:8000
      - REDIS_URL=redis://redis:6379
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ml_models:/app/models
      - ml_data:/app/data
      - ../ml_pipeline:/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  backend_models:
  ml_models:
  ml_data

networks:
  default:
    name: voice_cloning_network